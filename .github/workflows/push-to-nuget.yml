# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .NET

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  pack-push:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    env:
      project: ./Autossential.Activities.Packaging/Autossential.Activities.Packaging.csproj

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Adding nuget package sources (MyGet-Official)
      run: dotnet nuget add source https://pkgs.dev.azure.com/uipath/Public.Feeds/_packaging/UiPath-Official/nuget/v3/index.json --name UiPath-Official

    - name: Adding nuget package sources (UiPath-Internal)
      run: dotnet nuget add source https://uipath.pkgs.visualstudio.com/Public.Feeds/_packaging/UiPath-Internal/nuget/v3/index.json --name UiPath-Internal

    - name: Restore
      run: dotnet restore ${{env.project}}

    - name: Build
      run: dotnet build ${{env.project}} -c Release

    - name: Pack
      run: dotnet pack ${{env.project}} -c Release -o Package --no-build

    - name: Push to NuGet
      run: dotnet nuget push Package/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
