# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .NET

on:
  workflow_dispatch: 
  push:
    tags:
      - "v*.*.*"

jobs:
  pack-push:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    env:
      project: ./Autossential.Activities.Packaging/Autossential.Activities.Packaging.csproj

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore ${{env.project}} --configfile .nuget/NuGet.Config

    - name: Build
      run: dotnet build ${{env.project}} -c Release

    - name: Pack
      run: dotnet pack ${{env.project}} -c Release -o Package --no-build
