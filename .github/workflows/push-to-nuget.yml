# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .NET

on:
  workflow_dispatch: 
  push:
    tags:
      - "v*.*.*"
jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    env:
      PROJECT: ./Autossential.Activities.Packaging/Autossential.Activities.Packaging.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore $PROJECT --configfile .nuget/NuGet.Config
        working-directory: ${{ github.workspace }}

      - name: Build
        run: dotnet build $PROJECT -c Release --no-restore
        working-directory: ${{ github.workspace }}

      - name: Pack
        run: dotnet pack $PROJECT -c Release -o ${{ github.workspace }}\Package --no-build
        working-directory: ${{ github.workspace }}

      - name: Push to NuGet (Trusted Publishing)
        run: dotnet nuget push ${{ github.workspace }}\Package\*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
        working-directory: ${{ github.workspace }}
